# BBC-Tool 配置文件
# 用于管理 BBC 产品的各项工具功能

# ============================================================================
# 全局配置（所有子命令共享）
# ============================================================================
global:
  # 工作目录（每次执行会在此目录下创建时间戳子目录）
  # 格式: {work_dir}/{YYYYMMDDHHmmss}/
  # 示例: ./backups/20250311143025/
  work_dir: ./backups

  # 日志级别: debug, info, warn, error
  log_level: info

  # 日志文件名（相对于执行目录）
  log_file: execution.log

  # Kubernetes 配置
  kubeconfig: ~/.kube/config  # kubeconfig 文件路径
  context: ""                  # K8s context 名称（为空则使用 current-context）

  # Redis 配置（heartbeat 命令使用）
  redis: "1.1.1.1:6379"        # Redis 单节点地址，格式: host:port

  # 心跳判定参数（heartbeat 命令使用）
  heartbeat_threshold: 3       # 心跳次数阈值，设备心跳数 >= 该值视为在线（默认 3）
  heartbeat_time_window: 5     # 心跳时间窗口，单位分钟，last_online_time 在此范围内视为在线（默认 5）

# ============================================================================
# db 子命令配置
# ============================================================================
db:
  # 当前激活的数据中心
  current: gz-1

  # 数据库配置（按数据中心维度组织）
  dbs:
    # Redis 配置
    redis:
      - idc: gz-1
        addrs: "10.222.0.28:6379"
        password: "aaa"
      - idc: sz-4
        addrs: "10.223.0.6:6379"
        password: "bbb"

    # Kafka 配置
    kafka:
      - idc: gz-1
        addrs: "10.222.0.49:9092,10.222.0.50:9092,10.222.0.51:9092"
        saslHandshake: false
        dialerConfig:
          enable: false
      - idc: sz-4
        addrs: "10.223.0.11:9092,10.223.0.12:9092,10.223.0.13:9092"
        saslHandshake: true
        saslMechanism: "SCRAM-SHA-512"
        saslUsername: "cccc"
        saslPassword: "dddd"
        dialerConfig:
          enable: true
          addrMap:
            - oldAddr: "10.22.132.21:9093"
              newAddr: "10.223.0.11:9092"
            - oldAddr: "10.22.132.22:9093"
              newAddr: "10.223.0.12:9092"
            - oldAddr: "10.22.132.23:9093"
              newAddr: "10.223.0.13:9092"

  # 配置映射规则
  # 定义每个数据库的配置在哪些 ConfigMap 的哪些位置
  configMappings:
    redis:
      # 规则1: xaas-bbc-service-cfg/env.conf
      - configMap: xaas-bbc-service-cfg
        namespace: xcentral
        dataKey: env.conf
        format: ini
        section: redis
        fields:
          - name: server
            source: addrs
          - name: password
            source: password

      # 规则2: xaas-bbc-service-cfg/user_beego.conf (特殊格式)
      - configMap: xaas-bbc-service-cfg
        namespace: xcentral
        dataKey: user_beego.conf
        format: custom
        pattern: "sessionproviderconfig = user,{addrs},100,{password},0"

      # 规则3: cloudbbc-gateway-base-etc/env.conf
      - configMap: cloudbbc-gateway-base-etc
        namespace: xcentral
        dataKey: env.conf
        format: ini
        section: redis
        fields:
          - name: server
            source: addrs
          - name: password
            source: password

    kafka:
      # 规则1: xaas-bbc-service-cfg/env.yaml (完整 Kafka 字段)
      - configMap: xaas-bbc-service-cfg
        namespace: xcentral
        dataKey: env.yaml
        format: yaml
        yamlPath: kafka
        fields:
          - name: server
            source: addrs
          - name: saslHandshake
            source: saslHandshake
          - name: saslMechanism
            source: saslMechanism
          - name: saslUsername
            source: saslUsername
          - name: saslPassword
            source: saslPassword
          - name: dialerConfig.enable
            source: dialerConfig.enable
          - name: dialerConfig.addrMap
            source: dialerConfig.addrMap

      # 规则2: cloudbbc-gateway-base-etc/env.conf (INI 格式)
      - configMap: cloudbbc-gateway-base-etc
        namespace: xcentral
        dataKey: env.conf
        format: ini
        section: kafka
        fields:
          - name: server
            source: addrs
          - name: sasl_handshake
            source: saslHandshake
            transform: boolToString
          - name: sasl_mechanism
            source: saslMechanism
          - name: sasl_username
            source: saslUsername
          - name: sasl_password
            source: saslPassword
          - name: dialer_enable
            source: dialerConfig.enable
            transform: boolToString
          - name: dialer_old_addr
            source: dialerConfig.addrMap
            transform: extractOldAddrs
          - name: dialer_new_addr
            source: dialerConfig.addrMap
            transform: extractNewAddrs

  # 需要重启的服务列表
  services:
    - type: deployment
      namespace: xcentral
      names:
        - alarm
        - xaas-bbc-service

    - type: statefulset
      namespace: xcentral
      names:
        - cloudbbc-gateway

    - type: daemonset
      namespace: xcentral
      names:
        - cloudbbc-router

